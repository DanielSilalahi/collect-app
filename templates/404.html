<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Collection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('col-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        :root, [data-theme="dark"] {
            --e-bg: #020617;
            --e-text: #94A3B8;
            --e-accent: #6366F1;
            --e-accent2: #06B6D4;
        }
        [data-theme="light"] {
            --e-bg: #F1F5F9;
            --e-text: #64748B;
            --e-accent: #4F46E5;
            --e-accent2: #0EA5E9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--e-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .err-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--e-accent), var(--e-accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
            letter-spacing: -0.04em;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h4 {
            color: var(--e-text);
        }
        .btn-back {
            background: var(--e-accent);
            border-color: var(--e-accent);
            color: #fff;
            border-radius: 0.625rem;
            padding: 0.6rem 1.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-back:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="text-center">
        <div class="err-code">404</div>
        <h4 class="mb-4">Halaman tidak ditemukan</h4>
        <a href="/dashboard" class="btn btn-back">Kembali ke Dashboard</a>
    </div>
</body>
</html>
