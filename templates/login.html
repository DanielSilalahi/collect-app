<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Collection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('col-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        :root, [data-theme="dark"] {
            --login-bg: #030712;
            --login-bg-2: #111827;
            --login-card: rgba(17,24,39,0.9);
            --login-border: rgba(148,163,184,0.15);
            --login-text: #FFFFFF;
            --login-muted: #CBD5E1;
            --login-accent: #818CF8;
            --login-accent-hover: #A5B4FC;
            --login-accent-glow: rgba(129,140,248,0.3);
            --login-input-bg: #1F2937;
            --login-input-border: rgba(148,163,184,0.2);
            --login-input-text: #F1F5F9;
            --login-icon-color: #94A3B8;
        }
        [data-theme="light"] {
            --login-bg: #F0F4F8;
            --login-bg-2: #E2E8F0;
            --login-card: rgba(255,255,255,0.95);
            --login-border: rgba(0,0,0,0.08);
            --login-text: #0F172A;
            --login-muted: #64748B;
            --login-accent: #6366F1;
            --login-accent-hover: #4F46E5;
            --login-accent-glow: rgba(99,102,241,0.18);
            --login-input-bg: #FFFFFF;
            --login-input-border: #E2E8F0;
            --login-input-text: #1E293B;
            --login-icon-color: #94A3B8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--login-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.3s;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
            animation: bgShift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-3%, 3%) rotate(2deg); }
        }
        .login-card {
            background: var(--login-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--login-border);
            border-radius: 1.25rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
            transition: background 0.3s, border-color 0.3s;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card .brand {
            color: var(--login-accent);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
        }
        .login-card .brand i {
            margin-right: 0.35rem;
        }
        .login-card .subtitle {
            color: var(--login-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .login-card .form-label {
            color: var(--login-muted);
        }
        .login-card .form-control {
            background: var(--login-input-bg);
            border-color: var(--login-input-border);
            color: var(--login-text);
            border-radius: 0.625rem;
            padding: 0.65rem 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-card .form-control:focus {
            border-color: var(--login-accent);
            box-shadow: 0 0 0 3px var(--login-accent-glow);
            background: var(--login-input-bg);
            color: var(--login-text);
        }
        .login-card .form-control::placeholder {
            color: var(--login-muted);
            opacity: 0.6;
        }
        .login-card .input-group-text {
            background: var(--login-input-bg);
            border-color: var(--login-input-border);
            color: var(--login-muted);
            border-radius: 0.625rem 0 0 0.625rem;
        }
        .login-card .input-group .form-control {
            border-radius: 0 0.625rem 0.625rem 0;
        }
        .btn-login {
            background: var(--login-accent);
            border-color: var(--login-accent);
            color: #fff;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 0.625rem;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .btn-login:hover {
            background: var(--login-accent-hover);
            border-color: var(--login-accent-hover);
            box-shadow: 0 0 0 3px var(--login-accent-glow);
            color: #fff;
        }
        .alert-danger {
            background: rgba(239,68,68,0.12);
            color: #EF4444;
            border-color: rgba(239,68,68,0.2);
            border-radius: 0.75rem;
        }
        .theme-login-toggle {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: transparent;
            border: 1px solid var(--login-border);
            color: var(--login-muted);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            padding: 0;
            z-index: 2;
        }
        .theme-login-toggle:hover {
            color: var(--login-accent);
            border-color: var(--login-accent);
        }
        [data-theme="dark"] .theme-login-toggle .bi-sun-fill { display: inline-block; }
        [data-theme="dark"] .theme-login-toggle .bi-moon-fill { display: none; }
        [data-theme="light"] .theme-login-toggle .bi-sun-fill { display: none; }
        [data-theme="light"] .theme-login-toggle .bi-moon-fill { display: inline-block; }
    </style>
</head>
<body>
    <button type="button" class="theme-login-toggle" onclick="toggleTheme()" title="Toggle Dark/Light">
        <i class="bi bi-sun-fill"></i>
        <i class="bi bi-moon-fill"></i>
    </button>
    <div class="login-card">
        <div class="text-center">
            <div class="brand"><i class="bi bi-collection-fill"></i>Collection P2P</div>
            <div class="subtitle">Login ke Dashboard Admin</div>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Masukkan username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>
    </div>
    <script>
        function toggleTheme() {
            var c = document.documentElement.getAttribute('data-theme') || 'dark';
            var n = c === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', n);
            localStorage.setItem('col-theme', n);
        }
    </script>
</body>
</html>
